networks:
  control_vehiculos_net:
    driver: bridge
    internal: false
  proxy_network:
    external: true

volumes:
  storage_public:

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: control_vehiculos_app
    image: control_vehiculos_app:latest
    networks:
      - control_vehiculos_net
    env_file:
      - .env
    expose:
      - '9000'
    volumes:
      - storage_public:/var/www/storage/app/public
    healthcheck:
      test: ['CMD', 'cgi-fcgi', '-bind', '-connect', '127.0.0.1:9000']
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    image: control_vehiculos_web:latest
    container_name: control_vehiculos_nginx
    networks:
      - control_vehiculos_net
      - proxy_network
    expose:
      - '80'
    volumes:
      - storage_public:/var/www/storage/app/public:ro
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://127.0.0.1/']
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped