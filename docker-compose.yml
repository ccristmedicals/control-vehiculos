services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: control_vehiculos_app
    volumes:
      - .:/var/www
    networks:
      - proxy_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"
    entrypoint: >
      sh -c "
        composer install --no-dev --optimize-autoloader &&
        php artisan optimize &&
        chown -R www-data:www-data /var/www/storage /var/www/bootstrap/cache &&
        php-fpm
      "

  nginx_interno:
    image: nginx:alpine
    restart: unless-stopped
    container_name: control_vehiculos_nginx
    volumes:
      - .:/var/www
      - ./nginx-interno.conf:/etc/nginx/conf.d/default.conf
    networks:
      - proxy_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"

networks:
  proxy_network:
    external: true